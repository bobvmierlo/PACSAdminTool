name: Build and attach release executables

on:
  release:
    types: [published]

permissions:
  contents: write          # needed to upload assets to the release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build GUI executable
        run: pyinstaller pacs_tool.spec

      - name: Build Web Server executable
        run: pyinstaller pacs_web.spec

      - name: Upload executables to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PacsAdminTool.exe
            dist/PacsAdminToolWeb.exe
