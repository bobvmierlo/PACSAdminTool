name: Build and attach release executables

on:
  release:
    types: [published]

permissions:
  contents: write          # needed to upload assets to the release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject PostHog API key
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: |
          python -c "
          import os, pathlib
          key = os.environ.get('POSTHOG_API_KEY', '')
          if key:
              p = pathlib.Path('web/telemetry.py')
              p.write_text(p.read_text().replace('phc_REPLACE_WITH_YOUR_POSTHOG_PROJECT_API_KEY', key))
          "

      - name: Sync version info files
        run: python update_version_info.py

      - name: Build GUI executable
        run: pyinstaller pacs_tool.spec

      - name: Build Web Server executable
        run: pyinstaller pacs_web.spec

      - name: Upload executables to release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            dist/PacsAdminTool.exe
            dist/PacsAdminToolWeb.exe
