name: Sync download statistics to PostHog

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  sync-stats:
    runs-on: ubuntu-latest

    permissions:
      contents:  read
      packages:  read   # required to read GHCR package statistics via GraphQL

    steps:
      - name: Fetch GitHub release downloads and Docker Hub pulls, push to PostHog
        env:
          POSTHOG_API_KEY:    ${{ secrets.POSTHOG_API_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GH_TOKEN:           ${{ secrets.GITHUB_TOKEN }}
          GH_REPO_OWNER:      ${{ github.repository_owner }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, datetime

          POSTHOG_HOST    = "https://eu.i.posthog.com"
          POSTHOG_KEY     = os.environ["POSTHOG_API_KEY"]
          REPO            = "bobvmierlo/PACSAdminTool"
          REPO_OWNER      = os.environ.get("GH_REPO_OWNER", "bobvmierlo")
          PACKAGE_NAME    = "pacsadmintool"
          DOCKERHUB_USER  = os.environ.get("DOCKERHUB_USERNAME", "bobvmierlo")
          GH_TOKEN        = os.environ["GH_TOKEN"]
          TODAY           = datetime.date.today().isoformat()

          # ── PostHog helper ────────────────────────────────────────────────

          def capture(distinct_id, event, properties):
              payload = json.dumps({
                  "api_key":     POSTHOG_KEY,
                  "distinct_id": distinct_id,
                  "event":       event,
                  "properties":  {"$geoip_disable": True, **properties},
              }).encode()
              req = urllib.request.Request(
                  f"{POSTHOG_HOST}/capture/",
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST",
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  pass

          def gh_get(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      "Authorization":        f"Bearer {GH_TOKEN}",
                      "Accept":               "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          # ── GitHub: per-release asset download counts ─────────────────────

          releases = gh_get(f"https://api.github.com/repos/{REPO}/releases")

          total_github_downloads = 0
          for release in releases:
              version = release["tag_name"].lstrip("v")
              for asset in release.get("assets", []):
                  count = asset.get("download_count", 0)
                  total_github_downloads += count
                  capture(
                      f"stats:github:{version}:{asset['name']}",
                      "github_asset_downloads",
                      {
                          "source":         "github",
                          "version":        version,
                          "asset":          asset["name"],
                          "download_count": count,
                          "date":           TODAY,
                          "$set": {
                              "download_count": count,
                              "version":        version,
                              "asset":          asset["name"],
                          },
                      },
                  )
                  print(f"  GitHub  {version}  {asset['name']:35s}  {count:>6} downloads")

          capture(
              "stats:github:total",
              "github_total_downloads",
              {
                  "source":         "github",
                  "download_count": total_github_downloads,
                  "date":           TODAY,
                  "$set": {"download_count": total_github_downloads},
              },
          )
          print(f"  GitHub  TOTAL  {total_github_downloads} downloads")

          # ── GHCR: pull counts via GitHub GraphQL API ──────────────────
          # The REST packages API does not populate pull counts for container
          # packages. The GraphQL API exposes Package.statistics.downloadsTotalCount
          # and per-version counts correctly.

          graphql_query = """
          query($owner: String!, $name: String!) {
            user(login: $owner) {
              packages(names: [$name], packageType: CONTAINER, first: 1) {
                nodes {
                  name
                  statistics { downloadsTotalCount }
                  versions(first: 50, orderBy: {field: CREATED_AT, direction: DESC}) {
                    nodes {
                      version
                      statistics { downloadsTotalCount }
                      metadata {
                        ... on DockerImageMetadata {
                          tags { name }
                        }
                      }
                    }
                  }
                }
              }
            }
          }
          """

          gql_payload = json.dumps({
              "query":     graphql_query,
              "variables": {"owner": REPO_OWNER, "name": PACKAGE_NAME},
          }).encode()
          gql_req = urllib.request.Request(
              "https://api.github.com/graphql",
              data=gql_payload,
              headers={
                  "Authorization":        f"Bearer {GH_TOKEN}",
                  "Content-Type":         "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          with urllib.request.urlopen(gql_req, timeout=15) as r:
              gql_data = json.loads(r.read())

          # Print raw response so we can see exactly what GitHub returns
          print("  GHCR raw GraphQL response:")
          print(json.dumps(gql_data, indent=2))

          pkg_nodes = (
              gql_data.get("data", {})
                      .get("user", {})
                      .get("packages", {})
                      .get("nodes", [])
          )
          ghcr_total = 0
          if pkg_nodes:
              pkg = pkg_nodes[0]
              ghcr_total = pkg.get("statistics", {}).get("downloadsTotalCount", 0)
              for v in pkg.get("versions", {}).get("nodes", []):
                  v_count = v.get("statistics", {}).get("downloadsTotalCount", 0)
                  raw_tags = (
                      v.get("metadata", {}).get("tags", []) if v.get("metadata") else []
                  )
                  tags = [t["name"] for t in raw_tags if isinstance(t, dict)] \
                         if raw_tags and isinstance(raw_tags[0], dict) \
                         else [t for t in raw_tags if isinstance(t, str)]
                  label = ", ".join(tags) if tags else v.get("version", "untagged")[:20]
                  for tag in (tags or [v.get("version", "untagged")]):
                      capture(
                          f"stats:ghcr:{tag}",
                          "ghcr_tag_pulls",
                          {
                              "source":     "ghcr",
                              "tag":        tag,
                              "pull_count": v_count,
                              "date":       TODAY,
                              "$set": {"pull_count": v_count, "tag": tag},
                          },
                      )
                  print(f"  GHCR  {label:30s}  {v_count:>6} pulls")

          capture(
              "stats:ghcr:total",
              "ghcr_pulls",
              {
                  "source":     "ghcr",
                  "pull_count": ghcr_total,
                  "date":       TODAY,
                  "$set": {"pull_count": ghcr_total},
              },
          )
          print(f"  GHCR  TOTAL  {ghcr_total} pulls")

          # ── Docker Hub: repository-level pull count ───────────────────────

          req = urllib.request.Request(
              f"https://hub.docker.com/v2/repositories/{DOCKERHUB_USER}/pacsadmintool/",
          )
          with urllib.request.urlopen(req, timeout=15) as r:
              dh_repo = json.loads(r.read())

          dh_pulls = dh_repo.get("pull_count", 0)
          capture(
              "stats:dockerhub:total",
              "dockerhub_pulls",
              {
                  "source":     "dockerhub",
                  "pull_count": dh_pulls,
                  "date":       TODAY,
                  "$set": {"pull_count": dh_pulls},
              },
          )
          print(f"  Docker Hub  TOTAL  {dh_pulls} pulls")

          # Docker Hub does not expose per-tag pull counts via its public API.
          # Total pull count (above) is the only reliable metric available.

          print("Done.")
          PYEOF
